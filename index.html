<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Media Constellations — a machine for more perspectives</title>
<style>
  :root{
    --bg:#070a14; --bg2:#0b1022; --ink:#e8ecf8;
    --dim:#9aa6c8; --faint:#5d688f; --line:rgba(150,170,230,.14);
    --card:rgba(20,28,54,.72); --card-b:rgba(120,150,230,.16);
    --accent:#8fb6ff; --glow:rgba(143,182,255,.55);
    --teal:#46d6c4; --violet:#b48bff; --amber:#ffc06a; --rose:#ff7fa8; --green:#7ce0a0;
    --blue:#6fa8ff; --sand:#e7c98a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 800px at 70% -10%, #131c3a 0%, var(--bg2) 38%, var(--bg) 100%);
    color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #stars{position:fixed;inset:0;z-index:0;display:block}
  .app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}

  /* ---------- top bar ---------- */
  header{
    display:flex;align-items:center;gap:14px;padding:12px 18px;flex-wrap:wrap;
    border-bottom:1px solid var(--line);backdrop-filter:blur(6px);
  }
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand .mark{width:30px;height:30px;flex:0 0 auto}
  .brand h1{font-size:16px;margin:0;font-weight:650;letter-spacing:.2px;white-space:nowrap}
  .brand small{display:block;color:var(--dim);font-size:11px;font-weight:400;letter-spacing:.3px}
  .urlbar{display:flex;align-items:center;gap:8px;flex:1 1 360px;min-width:240px;
    background:rgba(12,18,40,.7);border:1px solid var(--card-b);border-radius:11px;padding:6px 6px 6px 14px}
  .urlbar svg{flex:0 0 auto;opacity:.6}
  .urlbar input{flex:1;background:none;border:0;color:var(--ink);font-size:13.5px;outline:none;min-width:60px}
  .urlbar input::placeholder{color:var(--faint)}
  .urlbar button{background:linear-gradient(180deg,#5e83ff,#4a66e8);color:#fff;border:0;border-radius:8px;
    padding:8px 15px;font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap}
  .urlbar button:hover{filter:brightness(1.08)}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{background:rgba(30,40,74,.6);border:1px solid var(--card-b);color:var(--dim);
    border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;white-space:nowrap;transition:.15s}
  .chip:hover{color:var(--ink);border-color:var(--accent)}
  .chip.active{color:#cfe0ff;border-color:var(--accent);box-shadow:0 0 0 1px var(--glow) inset}
  .ghostbtn{background:rgba(30,40,74,.5);border:1px solid var(--card-b);color:var(--dim);
    border-radius:999px;padding:6px 13px;font-size:12px;cursor:pointer}
  .ghostbtn:hover{color:var(--ink)}

  /* ---------- main grid ---------- */
  .main{flex:1;display:grid;grid-template-columns:330px 1fr 360px;gap:0;min-height:0}
  .col{min-height:0;display:flex;flex-direction:column;overflow:hidden}
  .left{border-right:1px solid var(--line)}
  .right{border-left:1px solid var(--line)}
  .pad{padding:16px 18px}
  .scroll{overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(120,150,230,.3) transparent}
  .scroll::-webkit-scrollbar{width:8px}
  .scroll::-webkit-scrollbar-thumb{background:rgba(120,150,230,.28);border-radius:4px}

  /* player */
  .player{aspect-ratio:16/9;background:#000;border-radius:0;position:relative}
  .player iframe{width:100%;height:100%;border:0;display:block}
  .meta h2{font-size:17px;margin:2px 0 4px;line-height:1.25}
  .meta .by{color:var(--accent);font-size:13px;font-weight:600}
  .meta .sub{color:var(--dim);font-size:12px;margin-top:2px}
  .blurb{color:var(--dim);font-size:13px;margin-top:12px;font-style:italic;
    border-left:2px solid var(--card-b);padding-left:11px}
  .seclabel{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--faint);
    margin:20px 0 9px;font-weight:600}
  .echo{display:flex;gap:10px;margin:9px 0;font-size:12.5px}
  .echo b{color:var(--sand);font-weight:600}
  .echo .yr{color:var(--faint);font-size:11px;flex:0 0 auto;width:40px}
  .echo p{margin:0;color:var(--dim)}

  /* ---------- constellation center ---------- */
  .center{position:relative;background:
    radial-gradient(700px 540px at 50% 46%, rgba(40,58,120,.20), transparent 70%);}
  #sky{position:absolute;inset:0;width:100%;height:100%}
  .hint{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);
    color:var(--faint);font-size:12px;letter-spacing:.3px;pointer-events:none;text-align:center;width:90%}
  /* svg node styles handled inline + classes */
  .node{cursor:pointer}
  .node text{font-size:12px;fill:var(--ink);text-anchor:middle;pointer-events:none;
    paint-order:stroke;stroke:rgba(7,10,20,.85);stroke-width:3px;font-weight:500}
  .node .ring{fill:none;stroke-width:1.2}
  .center-node text{font-size:12.5px;font-weight:600;fill:#dfe7ff}
  .thinker text{font-size:11px;fill:#d6deff}
  .thinker .match{font-size:9.5px;fill:var(--faint);font-weight:600}
  .dimmed{opacity:.18;transition:opacity .4s}
  .missing-node text{fill:#ffd9e6}
  .edge{stroke:var(--line);stroke-width:1}
  .edge.live{stroke:rgba(160,190,255,.4)}
  .edge.missing{stroke:rgba(255,140,180,.4);stroke-dasharray:3 5}

  .reveal-btn{position:absolute;left:50%;top:14px;transform:translateX(-50%);
    display:flex;align-items:center;gap:9px;
    background:linear-gradient(180deg,rgba(40,30,70,.9),rgba(30,22,56,.92));
    border:1px solid rgba(180,139,255,.45);color:#e9ddff;border-radius:999px;
    padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;
    box-shadow:0 6px 26px rgba(120,80,220,.35),0 0 0 1px rgba(180,139,255,.15) inset;
    transition:.18s}
  .reveal-btn:hover{filter:brightness(1.12);transform:translateX(-50%) translateY(-1px)}
  .reveal-btn.on{background:linear-gradient(180deg,#7a5bd8,#6346c0);color:#fff}
  .reveal-btn .pulse{width:8px;height:8px;border-radius:50%;background:#ff9ec6;
    box-shadow:0 0 10px #ff7fb0;animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:.5;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}

  /* ---------- right rail ---------- */
  .panel-title{font-size:14.5px;font-weight:650;margin:0 0 3px}
  .tag{display:inline-block;background:rgba(40,52,94,.7);border:1px solid var(--card-b);
    color:var(--dim);border-radius:6px;padding:3px 8px;font-size:11px;margin:3px 5px 0 0}
  .tag.emo{color:#ffd0a0;border-color:rgba(255,180,120,.25)}
  .tag.rhet{color:#c0b0ff;border-color:rgba(180,150,255,.25)}
  .qa{margin:14px 0}
  .qa h4{font-size:12px;color:var(--accent);margin:0 0 4px;font-weight:600;letter-spacing:.2px}
  .qa ul{margin:0;padding-left:17px;color:var(--dim);font-size:13px}
  .qa ul li{margin:4px 0}
  .qa p{margin:0;color:var(--ink);font-size:13.5px}

  .reading{border:1px solid var(--card-b);border-radius:10px;padding:11px 13px;margin:9px 0;
    background:rgba(16,22,46,.55)}
  .reading .lens{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
  .reading p{margin:5px 0 0;font-size:13px;color:var(--ink)}

  .thinker-card .name{font-size:16px;font-weight:650}
  .thinker-card .trad{color:var(--accent);font-size:12px;font-weight:600;margin-top:1px}
  .matchbar{height:5px;border-radius:3px;background:rgba(255,255,255,.08);margin:10px 0;overflow:hidden}
  .matchbar i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,#5e83ff,#b48bff)}
  .book{display:flex;gap:9px;margin:8px 0;font-size:12.5px}
  .book .bk{color:var(--sand);font-weight:600}
  .book .bc{color:var(--dim);font-style:italic}
  .backlink{color:var(--accent);cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:5px;margin-bottom:8px}
  .backlink:hover{text-decoration:underline}

  /* ---------- praxis dock ---------- */
  .dock{border-top:1px solid var(--line);background:rgba(8,12,26,.82);backdrop-filter:blur(8px)}
  .dock-head{display:flex;align-items:center;gap:8px;padding:9px 18px;flex-wrap:wrap}
  .dock-head .lbl{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--faint);
    font-weight:600;margin-right:4px}
  .ptab{background:none;border:1px solid transparent;color:var(--dim);border-radius:8px;
    padding:5px 11px;font-size:12.5px;cursor:pointer}
  .ptab:hover{color:var(--ink)}
  .ptab.active{color:#fff;background:rgba(50,66,120,.6);border-color:var(--card-b)}
  .dock-toggle{margin-left:auto;color:var(--dim);cursor:pointer;font-size:12px;
    border:1px solid var(--card-b);border-radius:8px;padding:5px 11px;background:rgba(30,40,74,.5)}
  .dock-body{padding:4px 18px 16px;display:grid;grid-template-columns:1.4fr 1fr;gap:22px;
    max-height:30vh;overflow-y:auto}
  .dock.collapsed .dock-body{display:none}
  .praxis-list{margin:0;padding-left:18px}
  .praxis-list li{margin:7px 0;font-size:13.5px;color:var(--ink)}
  .praxis-list li small{display:block;color:var(--dim);font-size:12px;margin-top:1px}
  .personas .seclabel{margin-top:0}
  .persona{margin:9px 0}
  .persona b{color:var(--violet)}
  .persona .pl{color:var(--faint);font-size:11px;margin-left:6px}
  .persona p{margin:2px 0 0;color:var(--dim);font-size:12.5px}

  /* atlas overlay */
  .overlay{position:fixed;inset:0;z-index:50;background:rgba(4,7,16,.74);backdrop-filter:blur(5px);
    display:none;align-items:center;justify-content:center;padding:30px}
  .overlay.on{display:flex}
  .atlas{max-width:680px;width:100%;max-height:84vh;overflow:auto;background:linear-gradient(180deg,#0d142c,#0a0f22);
    border:1px solid var(--card-b);border-radius:18px;padding:26px 30px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .atlas h2{margin:0 0 2px;font-size:20px}
  .atlas .sub{color:var(--dim);font-size:13px;margin-bottom:18px}
  .atlas .x{float:right;cursor:pointer;color:var(--dim);font-size:22px;line-height:1;margin:-6px -8px 0 0}
  .bars div{margin:7px 0}
  .bars .row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px}
  .bars .row span:last-child{color:var(--faint);font-size:11px}
  .bars .b{height:7px;border-radius:4px;background:rgba(255,255,255,.07);overflow:hidden}
  .bars .b i{display:block;height:100%;background:linear-gradient(90deg,#46d6c4,#8fb6ff)}
  .atlas .empty{color:var(--dim);font-style:italic;padding:20px 0}

  /* toast */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:rgba(20,26,50,.96);border:1px solid var(--card-b);color:var(--ink);
    padding:12px 18px;border-radius:12px;font-size:13px;z-index:60;opacity:0;pointer-events:none;
    transition:.3s;max-width:440px;box-shadow:0 14px 40px rgba(0,0,0,.5)}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast b{color:var(--accent)}

  @media (max-width:1080px){
    .main{grid-template-columns:1fr;grid-template-rows:auto 50vh auto}
    .left,.right{border:0;border-bottom:1px solid var(--line)}
    .left .scroll{max-height:none}
  }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="app">
  <header>
    <div class="brand">
      <svg class="mark" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="4.5" fill="#8fb6ff"/>
        <circle cx="20" cy="20" r="9" stroke="#46d6c4" stroke-width="1" opacity=".7"/>
        <circle cx="20" cy="20" r="15" stroke="#b48bff" stroke-width="1" opacity=".5"/>
        <circle cx="29" cy="20" r="2.2" fill="#46d6c4"/>
        <circle cx="20" cy="6.5" r="2" fill="#b48bff"/>
        <circle cx="9" cy="27" r="1.7" fill="#ffc06a"/>
        <circle cx="33" cy="31" r="1.5" fill="#ff7fa8"/>
      </svg>
      <div>
        <h1>Media Constellations</h1>
        <small>increasing the dimensionality of understanding</small>
      </div>
    </div>
    <div class="urlbar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21.6 7.2a2.8 2.8 0 0 0-2-2C17.9 4.8 12 4.8 12 4.8s-5.9 0-7.6.4a2.8 2.8 0 0 0-2 2A29 29 0 0 0 2 12a29 29 0 0 0 .4 4.8 2.8 2.8 0 0 0 2 2c1.7.4 7.6.4 7.6.4s5.9 0 7.6-.4a2.8 2.8 0 0 0 2-2A29 29 0 0 0 22 12a29 29 0 0 0-.4-4.8ZM10 15V9l5 3-5 3Z"/></svg>
      <input id="url" placeholder="Paste a YouTube URL…  (try a curated talk below)" />
      <button id="mapit">Map it</button>
    </div>
    <div class="chips" id="chips"></div>
    <button class="ghostbtn" id="atlasBtn">✦ Your Atlas</button>
  </header>

  <div class="main">
    <!-- LEFT : player + media analysis -->
    <div class="col left">
      <div class="player" id="player"></div>
      <div class="pad scroll">
        <div class="meta" id="meta"></div>
        <div class="blurb" id="blurb"></div>
        <div id="echoes"></div>
      </div>
    </div>

    <!-- CENTER : the constellation -->
    <div class="col center" id="center">
      <button class="reveal-btn" id="revealBtn"><span class="pulse"></span>Show me perspectives I haven't considered</button>
      <svg id="sky"></svg>
      <div class="hint" id="hint">Tap a glowing theme to open its thinkers · tap a thinker to read the lens</div>
    </div>

    <!-- RIGHT : analysis / contradictions / thinker detail -->
    <div class="col right scroll pad" id="rail"></div>
  </div>

  <!-- PRAXIS DOCK -->
  <div class="dock" id="dock">
    <div class="dock-head">
      <span class="lbl">Praxis — what can be done</span>
      <button class="ptab active" data-mode="reflective">Reflective</button>
      <button class="ptab" data-mode="educational">Educational</button>
      <button class="ptab" data-mode="community">Community</button>
      <button class="ptab" data-mode="civic">Civic</button>
      <button class="ptab" data-mode="creative">Creative</button>
      <button class="ptab" data-mode="organising">Organising</button>
      <button class="dock-toggle" id="dockToggle">Hide ▾</button>
    </div>
    <div class="dock-body">
      <div><ul class="praxis-list" id="praxisList"></ul></div>
      <div class="personas">
        <div class="seclabel">Walk with…</div>
        <div id="personas"></div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="atlasOverlay">
  <div class="atlas">
    <span class="x" id="atlasClose">×</span>
    <h2>Your Atlas</h2>
    <div class="sub">Not a map of identity — a map of attention. What keeps returning across what you watch.</div>
    <div id="atlasBody"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   MEDIA CONSTELLATIONS — single-file prototype
   Hand-authored constellations for three real talks.
   ============================================================ */

const PALETTE = {teal:'#46d6c4',violet:'#b48bff',amber:'#ffc06a',rose:'#ff7fa8',green:'#7ce0a0',blue:'#6fa8ff',sand:'#e7c98a'};

const MEDIA = {
  /* ---------------------------------------------------------- */
  hanson:{
    yt:'N17G0Mw43YA',
    title:'Address to the National Press Club',
    speaker:'Pauline Hanson',
    sub:'National Press Club · 2026 · ~45 min · political speech',
    blurb:'“Australians are mad as hell… they want their country back.” — a populist case that mass immigration, an out-of-touch elite and a taxpayer-funded media have betrayed ordinary Australians.',
    analysis:{
      happening:'Australia’s longest-serving minor-party leader makes a populist pitch: that record migration, an unaccountable elite and a partisan public broadcaster have failed “ordinary Australians” — and that One Nation is the channel for their anger. Concrete planks include cutting migration, one national “cultural umbrella”, scrapping SBS and part-defunding the ABC.',
      assumptions:['That there is a single, coherent “Australian people” whose will has been ignored.','That immigration numbers are a primary cause — not a symptom — of housing and cohesion strain.','That national belonging requires one shared “cultural umbrella”.','That public broadcasters are an elite gatekeeper the internet has made redundant.'],
      tensions:['Speaks for “the people’s” sovereignty while representing a minority of the vote.','“Take our country back” — on a continent never ceded by its First Peoples.','Attacks the establishment as a 30-year parliamentary incumbent.','Defends free speech while proposing to defund broadcasters she opposes.'],
      absent:['First Nations sovereignty — whose country, and back to when?','Migrants’ own voices, and the economic data on their contribution.','The structural housing drivers (supply, tax settings, infrastructure) migration is standing in for.','The Pacific and climate justice behind her climate scepticism.'],
      questions:['Which strains are caused by migration, and which by policy choices about housing, wages and infrastructure?','Whose “cultural umbrella”, chosen by whom?','What would actually rebuild the cohesion she says has been lost?']
    },
    echoes:[
      {yr:'1901',t:'White Australia Policy',p:'The Immigration Restriction Act — the nation’s founding attempt to legislate who belongs. Resonance, not equivalence.'},
      {yr:'1996',t:'Hanson’s maiden speech',p:'“Swamped by Asians.” Her own earlier single story — the speaker echoing herself thirty years on.'},
      {yr:'2001',t:'Tampa — “we will decide”',p:'Howard’s “we will decide who comes to this country” — border control as sovereignty made vivid.'},
      {yr:'2016',t:'Brexit / Trump',p:'“Take back control.” The global populist wave Hanson’s framing draws on and feeds.'}
    ],
    themes:[
      {id:'immig',label:'Immigration & the Nation',color:PALETTE.amber,
        emotion:['anxiety','loss of control'],rhetoric:['the big number (1.27m)','sovereignty appeal'],
        readings:[
          {lens:'Populist-nationalist',color:PALETTE.amber,p:'A people has the right to set the pace and terms of its own change; record migration without consent strains housing, services and the felt sense of a shared home.'},
          {lens:'Liberal-cosmopolitan',color:PALETTE.blue,p:'Movement is a freedom and a good; migrants build the economy and the culture, and moral worth does not stop at a border.'},
          {lens:'Political-economy',color:PALETTE.green,p:'“Immigration” is a lightning rod for housing under-supply, tax settings and employer wage-suppression — blame the system’s design, not the migrant.'}
        ],
        thinkers:[
          {name:'Benedict Anderson',match:91,trad:'Nationalism studies',why:'The nation is an “imagined community” — invented, yet genuinely felt and worth taking seriously as feeling.',books:[{t:'Imagined Communities',y:1983,c:'the imagined nation'}],concepts:['imagined community','print-capitalism']},
          {name:'David Goodhart',match:86,trad:'Communitarian commentary',why:'Names the “Somewheres” — rooted, place-attached people whose anxieties liberal “Anywheres” dismiss.',books:[{t:'The Road to Somewhere',y:2017,c:'Somewheres & Anywheres'}],concepts:['cultural anxiety','the achievement society']},
          {name:'Joseph Carens',match:80,trad:'Political philosophy',why:'The strong liberal counter: closed borders are the modern equivalent of feudal privilege.',books:[{t:'The Ethics of Immigration',y:2013,c:'open borders'}],concepts:['birthright privilege','social membership']}
        ]},
      {id:'pop',label:'Populism & “the People”',color:PALETTE.rose,
        emotion:['anger','vindication'],rhetoric:['“mad as hell”','people-vs-elite frame'],
        readings:[
          {lens:'Populist-democratic',color:PALETTE.rose,p:'Populism is a corrective — it re-enfranchises voters a comfortable consensus had stopped listening to.'},
          {lens:'Liberal-constitutional',color:PALETTE.blue,p:'The claim “we alone are the people” is anti-pluralist; it delegitimises opponents and erodes the institutions that protect everyone.'},
          {lens:'Discursive (Laclau)',color:PALETTE.violet,p:'“The people” is always constructed by drawing a frontier against an enemy — left and right both do it; the question is which chain of demands it binds.'}
        ],
        thinkers:[
          {name:'Cas Mudde',match:90,trad:'Political science',why:'Defines populism as a “thin” ideology splitting a pure people from a corrupt elite.',books:[{t:'Populism: A Very Short Introduction',y:2017,c:'thin-centred ideology'}],concepts:['the pure people','the corrupt elite']},
          {name:'Jan-Werner Müller',match:84,trad:'Political theory',why:'Argues populism’s core is anti-pluralism — the claim that only it represents the real people.',books:[{t:'What Is Populism?',y:2016,c:'anti-pluralism'}],concepts:['exclusive representation','the silent majority']},
          {name:'Ernesto Laclau',match:79,trad:'Post-Marxist theory',why:'Sees populism not as a pathology but as the very logic by which any “people” is forged.',books:[{t:'On Populist Reason',y:2005,c:'the construction of a people'}],concepts:['empty signifier','chains of equivalence']}
        ]},
      {id:'identity',label:'Identity & the “Cultural Umbrella”',color:PALETTE.teal,
        emotion:['nostalgia','protectiveness'],rhetoric:['assimilation appeal','one-nation unity'],
        readings:[
          {lens:'Civic-nationalist',color:PALETTE.teal,p:'A shared public culture and language is the glue of solidarity; without common ground, trust and the welfare state fray.'},
          {lens:'Multiculturalist',color:PALETTE.blue,p:'Liberal democracies can recognise group difference and still cohere; minority rights are part of equal citizenship, not a threat to it.'},
          {lens:'Postcolonial / settler-critique',color:PALETTE.green,p:'One “umbrella” in a settler-colonial nation assumes whose culture is the umbrella — and writes over the continent’s First Peoples.'}
        ],
        thinkers:[
          {name:'Will Kymlicka',match:87,trad:'Liberal political philosophy',why:'Shows minority rights can be grounded in liberal equality, not opposed to it.',books:[{t:'Multicultural Citizenship',y:1995,c:'group-differentiated rights'}],concepts:['societal culture','polyethnic rights']},
          {name:'Ghassan Hage',match:85,trad:'Australian anthropology',why:'“White Nation” dissects the fantasy of a governing white belonging that positions others as guests to be tolerated or expelled.',books:[{t:'White Nation',y:1998,c:'the fantasy of white governance'}],concepts:['governmental belonging','tolerance as power']},
          {name:'Charles Taylor',match:78,trad:'Communitarian philosophy',why:'Identity needs recognition; misrecognition is a real harm — and a real political demand on both sides.',books:[{t:'The Politics of Recognition',y:1992,c:'recognition'}],concepts:['recognition','the dialogical self']}

/* ---------------- starfield ---------------- */
(function(){
  const c=document.getElementById('stars'),x=c.getContext('2d');let stars=[];
  function size(){c.width=innerWidth;c.height=innerHeight;stars=[];
    const n=Math.min(220,innerWidth*innerHeight/9000);
    for(let i=0;i<n;i++)stars.push({x:Math.random()*c.width,y:Math.random()*c.height,
      r:Math.random()*1.3+.2,a:Math.random(),s:Math.random()*.02+.004});}
  function draw(){x.clearRect(0,0,c.width,c.height);
    for(const st of stars){st.a+=st.s;const tw=.4+Math.abs(Math.sin(st.a))*.6;
      x.globalAlpha=tw;x.fillStyle='#cdd9ff';x.beginPath();x.arc(st.x,st.y,st.r,0,7);x.fill();}
    x.globalAlpha=1;requestAnimationFrame(draw);}
  size();draw();addEventListener('resize',size);
})();

/* ---------------- state ---------------- */
let cur='hanson', focusTheme=null, focusThinker=null, revealMissing=false;
let praxisMode='reflective';
const sky=document.getElementById('sky');
let W=0,Hh=0,cx=0,cy=0,t0=performance.now();

/* atlas persistence */
const ATLAS_KEY='mediaConstellations.atlas.v1';
function loadAtlas(){try{return JSON.parse(localStorage.getItem(ATLAS_KEY))||{themes:{},thinkers:{},media:{}}}catch(e){return{themes:{},thinkers:{},media:{}}}}
function saveAtlas(a){try{localStorage.setItem(ATLAS_KEY,JSON.stringify(a))}catch(e){}}
function note(kind,label){const a=loadAtlas();a[kind][label]=(a[kind][label]||0)+1;saveAtlas(a);}

/* ---------------- node geometry ---------------- */
let nodes=[]; // {kind, ref, baseAngle, radius, speed, size, color, parent}
function buildNodes(){
  const m=MEDIA[cur];
  nodes=[];
  nodes.push({kind:'center',ref:m,x:0,y:0});
  const n=m.themes.length;
  m.themes.forEach((th,i)=>{
    nodes.push({kind:'theme',ref:th,baseAngle:(i/n)*Math.PI*2,
      radius:0,targetRadius:158+(i%2?20:0),speed:0.045+(i%3)*0.012,size:9,color:th.color});
  });
}
function rebuildThinkers(){
  nodes=nodes.filter(nd=>nd.kind==='center'||nd.kind==='theme'||nd.kind==='missing');
  if(focusTheme){
    const th=MEDIA[cur].themes.find(t=>t.id===focusTheme);
    if(th){const k=th.thinkers.length;
      th.thinkers.forEach((tk,i)=>{
        nodes.push({kind:'thinker',ref:tk,parent:focusTheme,
          baseAngle:(i/k)*Math.PI*2,radius:0,targetRadius:78,speed:0.09+(i%2?0.03:0),size:6,color:th.color});
      });
    }
  }
}
function rebuildMissing(){
  nodes=nodes.filter(nd=>nd.kind!=='missing');
  if(revealMissing){
    const ms=MEDIA[cur].missing,k=ms.length;
    ms.forEach((mm,i)=>{
      nodes.push({kind:'missing',ref:mm,baseAngle:(i/k)*Math.PI*2+0.3,
        radius:0,targetRadius:250+(i%2?16:0),speed:0.03,size:7,color:mm.color});
    });
  }
}

/* ---------------- render loop ---------------- */
function frame(now){
  const t=(now-t0)/1000;
  // resize svg coords
  const r=sky.getBoundingClientRect();W=r.width;Hh=r.height;cx=W/2;cy=Hh/2-6;
  // compute positions
  const pos={};
  for(const nd of nodes){
    if(nd.kind==='center'){nd.x=cx;nd.y=cy;continue;}
    if(nd.radius<nd.targetRadius)nd.radius=Math.min(nd.targetRadius,nd.radius+ (nd.targetRadius)*0.08+2);
    let ox=cx,oy=cy;
    if(nd.kind==='thinker'){const p=nodes.find(z=>z.kind==='theme'&&z.ref.id===nd.parent);if(p){ox=p.x;oy=p.y;}}
    const ang=nd.baseAngle+t*nd.speed;
    nd.x=ox+Math.cos(ang)*nd.radius;
    nd.y=oy+Math.sin(ang)*nd.radius;
  }
  paint();
  requestAnimationFrame(frame);
}

function el(tag,attrs){const e=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}

function paint(){
  sky.innerHTML='';
  const defs=el('defs',{});
  defs.innerHTML=`<filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  sky.appendChild(defs);
  const center=nodes.find(n=>n.kind==='center');
  const themeDimmed = !!focusTheme;
  // edges first
  for(const nd of nodes){
    if(nd.kind==='theme'){
      const live=focusTheme===nd.ref.id;
      const e=el('line',{x1:center.x,y1:center.y,x2:nd.x,y2:nd.y,class:'edge'+(live?' live':'')});
      if(themeDimmed&&!live)e.setAttribute('opacity','0.2');
      sky.appendChild(e);
    }
    if(nd.kind==='thinker'){
      const p=nodes.find(z=>z.kind==='theme'&&z.ref.id===nd.parent);
      if(p)sky.appendChild(el('line',{x1:p.x,y1:p.y,x2:nd.x,y2:nd.y,class:'edge live'}));
    }
    if(nd.kind==='missing'){
      sky.appendChild(el('line',{x1:center.x,y1:center.y,x2:nd.x,y2:nd.y,class:'edge missing'}));
    }
  }
  // nodes
  for(const nd of nodes){
    const g=el('g',{class:'node '+nd.kind});
    if(themeDimmed&&nd.kind==='theme'&&nd.ref.id!==focusTheme)g.setAttribute('class','node theme dimmed');
    if(nd.kind==='center'){
      g.appendChild(el('circle',{cx:nd.x,cy:nd.y,r:30,fill:'rgba(143,182,255,.08)',stroke:'rgba(143,182,255,.4)','stroke-width':1}));
      g.appendChild(el('circle',{cx:nd.x,cy:nd.y,r:18,fill:'rgba(143,182,255,.16)'}));
      const core=el('circle',{cx:nd.x,cy:nd.y,r:13,fill:'#dfe7ff',filter:'url(#glow)'});g.appendChild(core);
      const words=(nd.ref.title.length>34?nd.ref.title.slice(0,32)+'…':nd.ref.title).split(' ');
      let line='',lines=[];words.forEach(w=>{if((line+w).length>18){lines.push(line.trim());line=w+' ';}else line+=w+' ';});lines.push(line.trim());
      lines.forEach((ln,i)=>{const tx=el('text',{x:nd.x,y:nd.y+44+i*15});tx.textContent=ln;g.appendChild(tx);});
      sky.appendChild(g);continue;
    }
    const isMissing=nd.kind==='missing';
    const ring=el('circle',{cx:nd.x,cy:nd.y,r:nd.size+6,class:'ring',stroke:nd.color,opacity:isMissing?0.7:0.5});
    if(isMissing)ring.setAttribute('stroke-dasharray','2 4');
    g.appendChild(ring);
    const dot=el('circle',{cx:nd.x,cy:nd.y,r:nd.size,fill:nd.color,filter:'url(#glow)'});
    if(isMissing){dot.setAttribute('fill','none');dot.setAttribute('stroke',nd.color);dot.setAttribute('stroke-width',2);}
    g.appendChild(dot);
    if(nd.kind==='theme'){
      const tx=el('text',{x:nd.x,y:nd.y-nd.size-9});tx.textContent=nd.ref.label;g.appendChild(tx);
    } else if(nd.kind==='thinker'){
      const tx=el('text',{x:nd.x,y:nd.y-nd.size-8});tx.textContent=nd.ref.name;g.appendChild(tx);
      const mt=el('text',{x:nd.x,y:nd.y+nd.size+14,class:'match'});mt.textContent=nd.ref.match+'%';g.appendChild(mt);
    } else if(nd.kind==='missing'){
      const tx=el('text',{x:nd.x,y:nd.y-nd.size-9});tx.textContent='+ '+nd.ref.label;g.appendChild(tx);
    }
    g.style.cursor='pointer';
    g.addEventListener('click',()=>onNodeClick(nd));
    sky.appendChild(g);
  }
}

/* ---------------- interaction ---------------- */
function onNodeClick(nd){
  if(nd.kind==='center'){focusTheme=null;focusThinker=null;rebuildThinkers();renderRail();return;}
  if(nd.kind==='theme'){
    focusTheme=(focusTheme===nd.ref.id)?null:nd.ref.id;
    focusThinker=null;
    if(focusTheme)note('themes',nd.ref.label);
    rebuildThinkers();renderRail();
    document.getElementById('hint').textContent = focusTheme
      ? 'Thinkers now orbit this theme · tap one to read its lens · tap the centre to zoom out'
      : 'Tap a glowing theme to open its thinkers · tap a thinker to read the lens';
    return;
  }
  if(nd.kind==='thinker'){focusThinker=nd.ref;note('thinkers',nd.ref.name);renderThinker(nd.ref);return;}
  if(nd.kind==='missing'){renderMissing(nd.ref);return;}
}

/* ---------------- right rail ---------------- */

  } else {
    const a=m.analysis;
    rail.innerHTML=`

      <div class="qa"><h4>What is happening?</h4><p>${a.happening}</p></div>
      <div class="qa"><h4>What assumptions are at work?</h4><ul>${a.assumptions.map(x=>`<li>${x}</li>`).join('')}</ul></div>
      <div class="qa"><h4>What tensions live inside it?</h4><ul>${a.tensions.map(x=>`<li>${x}</li>`).join('')}</ul></div>
      <div class="qa"><h4>What perspectives are absent?</h4><ul>${a.absent.map(x=>`<li>${x}</li>`).join('')}</ul></div>
      <div class="qa"><h4>What questions should we ask?</h4><ul>${a.questions.map(x=>`<li>${x}</li>`).join('')}</ul></div>
      <div style="color:var(--faint);font-size:12px;margin-top:14px">Tap a theme in the constellation to open its competing readings and thinkers.</div>
    `;
  }
}
function renderThinker(tk){
  const th=MEDIA[cur].themes.find(t=>t.id===focusTheme)||MEDIA[cur].themes.find(t=>t.thinkers.includes(tk));
  const col=th?th.color:'#8fb6ff';
  rail.innerHTML=`
    <div class="backlink" onclick="backToTheme()">‹ back to ${th?th.label:'theme'}</div>
    <div class="thinker-card">
      <div class="name">${tk.name}</div>
      <div class="trad">${tk.trad}</div>
      <div class="matchbar"><i style="width:${tk.match}%"></i></div>
      <div style="color:var(--dim);font-size:12px;margin-top:-4px">${tk.match}% relevance to this media</div>
      <div class="qa"><h4>Why this thinker, here?</h4><p>${tk.why}</p></div>
      <div class="seclabel">Read into the orbit</div>
      ${tk.books.map(b=>`<div class="book"><span class="bk">▸</span><div><span class="bk">${b.t}</span> <span style="color:var(--faint)">${b.y<0?Math.abs(b.y)+' BCE':b.y}</span><br><span class="bc">${b.c}</span></div></div>`).join('')}
      <div class="seclabel">Concepts orbiting</div>
      <div>${tk.concepts.map(c=>`<span class="tag">${c}</span>`).join('')}</div>
    </div>`;
}
function renderMissing(mm){
  rail.innerHTML=`
    <div class="backlink" onclick="renderRail()">‹ back</div>
    <div class="panel-title" style="color:${mm.color}">+ ${mm.label}</div>
    <div class="seclabel" style="margin-top:14px">A perspective the media didn’t consider</div>
    <p style="font-size:14px;color:var(--ink)">${mm.why}</p>
    <div style="color:var(--faint);font-size:12px;margin-top:16px">This is the soul of the tool: not what to think, but how many more ways there are to think it.</div>`;
}
window.zoomOut=function(){focusTheme=null;focusThinker=null;rebuildThinkers();renderRail();
  document.getElementById('hint').textContent='Tap a glowing theme to open its thinkers · tap a thinker to read the lens';};
window.backToTheme=function(){focusThinker=null;renderRail();};
window.openThinker=function(mk,thid,name){focusTheme=thid;const tk=MEDIA[mk].themes.find(t=>t.id===thid).thinkers.find(t=>t.name===name);
  focusThinker=tk;note('thinkers',name);rebuildThinkers();renderThinker(tk);};

/* ---------------- praxis dock ---------------- */
function renderPraxis(){
  const m=MEDIA[cur];const list=m.praxis[praxisMode];
  document.getElementById('praxisList').innerHTML=list.map(p=>`<li>${p.t}<small>${p.s}</small></li>`).join('');
  document.getElementById('personas').innerHTML=m.praxis.personas.map(p=>
    `<div class="persona"><b>${p.n}</b><span class="pl">${p.l}</span><p>${p.p}</p></div>`).join('');
}
document.querySelectorAll('.ptab').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.ptab').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');praxisMode=b.dataset.mode;renderPraxis();}));
document.getElementById('dockToggle').addEventListener('click',function(){
  const d=document.getElementById('dock');d.classList.toggle('collapsed');
  this.textContent=d.classList.contains('collapsed')?'Show ▴':'Hide ▾';});

/* ---------------- left meta ---------------- */
function renderMeta(){
  const m=MEDIA[cur];
  document.getElementById('player').innerHTML=
    `<iframe src="https://www.youtube.com/embed/${m.yt}?rel=0" title="${m.title}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
  document.getElementById('meta').innerHTML=
    `<h2>${m.title}</h2><div class="by">${m.speaker}</div><div class="sub">${m.sub}</div>`;
  document.getElementById('blurb').textContent=m.blurb;
  document.getElementById('echoes').innerHTML=
    `<div class="seclabel">Historical echoes — resonance, not equivalence</div>`+
    m.echoes.map(e=>`<div class="echo"><span class="yr">${e.yr}</span><p><b>${e.t}.</b> ${e.p}</p></div>`).join('');
}

/* ---------------- chips ---------------- */
function renderChips(){
  document.getElementById('chips').innerHTML=ORDER.map(k=>
    `<div class="chip ${k===cur?'active':''}" data-k="${k}">${MEDIA[k].speaker.split(' ').slice(-1)[0]}</div>`).join('');
  document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>load(c.dataset.k)));
}

/* ---------------- load a media ---------------- */
function load(key){
  cur=key;focusTheme=null;focusThinker=null;revealMissing=false;
  document.getElementById('revealBtn').classList.remove('on');
  document.getElementById('url').value='https://youtu.be/'+MEDIA[key].yt;
  const a=loadAtlas();a.media[MEDIA[key].title]=(a.media[MEDIA[key].title]||0)+1;saveAtlas(a);
  buildNodes();rebuildThinkers();rebuildMissing();
  renderChips();renderMeta();renderRail();renderPraxis();
}

/* ---------------- reveal button ---------------- */
document.getElementById('revealBtn').addEventListener('click',function(){
  revealMissing=!revealMissing;this.classList.toggle('on',revealMissing);
  rebuildMissing();
  if(revealMissing){toast(`<b>${MEDIA[cur].missing.length} perspectives</b> the media didn’t consider have entered the constellation — the dashed nodes at the edge. Tap one.`);}
});

/* ---------------- url bar ---------------- */
function parseYT(u){const m=u.match(/(?:v=|youtu\.be\/|embed\/)([\w-]{11})/);return m?m[1]:null;}
document.getElementById('mapit').addEventListener('click',tryUrl);
document.getElementById('url').addEventListener('keydown',e=>{if(e.key==='Enter')tryUrl();});
function tryUrl(){
  const id=parseYT(document.getElementById('url').value.trim());
  if(!id){toast('That doesn’t look like a YouTube link yet. Try one of the curated talks below.');return;}
  const key=ORDER.find(k=>MEDIA[k].yt===id);
  if(key){load(key);toast('Constellation loaded.');}
  else toast('This one isn’t curated yet — live AI mapping is the next layer. For now, explore the three hand-built constellations in the chips above. <b>Their depth is the bar live mode has to clear.</b>');
}

/* ---------------- atlas overlay ---------------- */
function renderAtlas(){
  const a=loadAtlas();const body=document.getElementById('atlasBody');
  const th=Object.entries(a.themes).sort((x,y)=>y[1]-x[1]);
  const tk=Object.entries(a.thinkers).sort((x,y)=>y[1]-x[1]);
  const md=Object.entries(a.media).sort((x,y)=>y[1]-x[1]);
  if(!th.length&&!tk.length){body.innerHTML=`<div class="empty">Your atlas is still dark. Open some themes and thinkers and they’ll begin to accumulate here — a record of where your attention keeps going.</div>`;return;}
  const max=(arr)=>Math.max(...arr.map(e=>e[1]),1);
  const bars=(arr,m)=>`<div class="bars">${arr.slice(0,8).map(([k,v])=>
    `<div><div class="row"><span>${k}</span><span>${v}×</span></div><div class="b"><i style="width:${v/m*100}%"></i></div></div>`).join('')}</div>`;
  body.innerHTML=
    (th.length?`<div class="seclabel">Themes your attention returns to</div>${bars(th,max(th))}`:'')+
    (tk.length?`<div class="seclabel" style="margin-top:18px">Thinkers you keep opening</div>${bars(tk,max(tk))}`:'')+
    (md.length?`<div class="seclabel" style="margin-top:18px">Media visited</div>${bars(md,max(md))}`:'');
}
document.getElementById('atlasBtn').addEventListener('click',()=>{renderAtlas();document.getElementById('atlasOverlay').classList.add('on');});
document.getElementById('atlasClose').addEventListener('click',()=>document.getElementById('atlasOverlay').classList.remove('on'));
document.getElementById('atlasOverlay').addEventListener('click',e=>{if(e.target.id==='atlasOverlay')e.currentTarget.classList.remove('on');});

/* ---------------- toast ---------------- */
let toastTimer=null;
function toast(html){const t=document.getElementById('toast');t.innerHTML=html;t.classList.add('on');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('on'),5200);}

/* ---------------- go ---------------- */
load('hanson');
requestAnimationFrame(frame);
</script>
</body>
</html>
